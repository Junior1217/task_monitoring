<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Task Monitoring Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-sidebar { background: linear-gradient(180deg, #1e3c72 0%, #2a5298 100%); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .task-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-50 flex flex-col md:flex-row min-h-screen">

    <div class="md:hidden glass-sidebar p-4 text-white flex justify-between items-center shadow-lg sticky top-0 z-50">
        <h1 class="text-xl font-bold">Task Monitoring.</h1>
        <div class="text-xs bg-white/20 px-3 py-1 rounded-full font-bold">
            Done: <span id="mobile-done-count">0</span>
        </div>
    </div>

    <aside class="hidden md:flex w-72 glass-sidebar text-white p-8 flex-col shadow-2xl sticky top-0 h-screen">
        <h1 class="text-3xl font-extrabold mb-12 tracking-tight">Task Monitoring</h1>
        <nav class="space-y-6 flex-1">
            <a href="#" class="flex items-center space-x-4 p-4 bg-white/10 rounded-2xl shadow-inner border border-white/10">
                <span>📊</span> <span class="font-semibold">Dashboard</span>
            </a>
        </nav>
        <div class="mt-auto p-5 bg-white/5 rounded-2xl text-sm border border-white/10">
            <p class="opacity-70 text-xs uppercase font-bold tracking-widest">Made By</p>
            <p class="font-bold text-teal-400">John Rein Pamplona</p>
        </div>
    </aside>

    <main class="flex-1 p-4 md:p-12 lg:p-16 max-w-7xl mx-auto w-full">
        
        <header class="mb-10">
            <h2 class="text-2xl md:text-4xl font-bold text-slate-800">Your Tasks</h2>
            <p class="text-slate-500 mt-1">Managed locally in your browser.</p>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-10">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-wider">Total</p>
                <p id="stat-total" class="text-3xl font-black text-slate-800">0</p>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-wider">Completed</p>
                <p id="stat-completed" class="text-3xl font-black text-teal-500">0</p>
            </div>
            <div class="bg-blue-600 p-6 rounded-3xl shadow-lg shadow-blue-200 hidden md:block">
                <p class="text-blue-100 text-xs font-bold uppercase tracking-wider">Efficiency</p>
                <p id="stat-efficiency" class="text-3xl font-black text-white">0%</p>
            </div>
        </div>

        <section class="bg-white p-6 md:p-8 rounded-3xl shadow-xl border border-slate-100 mb-10">
            <form id="task-form" class="grid grid-cols-1 md:grid-cols-12 gap-6 items-end">
                <div class="md:col-span-5">
                    <label class="text-sm font-bold text-slate-700 mb-2 block">Task Title</label>
                    <input type="text" id="task-title" required placeholder="What needs to be done?" 
                           class="w-full p-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <div class="md:col-span-3">
                    <label class="text-sm font-bold text-slate-700 mb-2 block">Due Date</label>
                    <input type="datetime-local" id="task-deadline" required 
                           class="w-full p-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-blue-500 outline-none transition text-sm">
                </div>
                <div class="md:col-span-2">
                    <label class="text-sm font-bold text-slate-700 mb-2 block">Priority</label>
                    <select id="task-priority" class="w-full p-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-blue-500 outline-none transition appearance-none">
                        <option value="Low">Low</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <button type="submit" 
                            class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-100 active:scale-95">
                        Add
                    </button>
                </div>
            </form>
        </section>

        <div id="task-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <div class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around p-4 z-50 shadow-2xl">
        <button class="text-blue-600 text-2xl">🏠</button>
        <button class="text-slate-300 text-2xl">🔍</button>
        <button class="text-slate-300 text-2xl">⚙️</button>
    </div>
    
    <div class="h-20 md:hidden"></div>

    <script>
        // --- APP STATE & STORAGE ---
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

        const saveTasks = () => {
            localStorage.setItem('tasks', JSON.stringify(tasks));
            renderTasks();
        };

        // --- CORE FUNCTIONS ---
        const addTask = (e) => {
            e.preventDefault();
            const newTask = {
                id: Date.now(),
                title: document.getElementById('task-title').value,
                deadline: document.getElementById('task-deadline').value,
                priority: document.getElementById('task-priority').value,
                status: 'Pending'
            };
            tasks.unshift(newTask);
            document.getElementById('task-form').reset();
            saveTasks();
        };

        const deleteTask = (id) => {
            if(confirm('Remove this task?')) {
                tasks = tasks.filter(t => t.id !== id);
                saveTasks();
            }
        };

        const toggleComplete = (id) => {
            tasks = tasks.map(t => {
                if(t.id === id) t.status = (t.status === 'Completed' ? 'Pending' : 'Completed');
                return t;
            });
            saveTasks();
        };

        const renderTasks = () => {
            const grid = document.getElementById('task-grid');
            const totalStat = document.getElementById('stat-total');
            const completedStat = document.getElementById('stat-completed');
            const mobileDone = document.getElementById('mobile-done-count');
            const efficiencyStat = document.getElementById('stat-efficiency');

            // Calculate Stats
            const total = tasks.length;
            const completed = tasks.filter(t => t.status === 'Completed').length;
            const efficiency = total > 0 ? Math.round((completed / total) * 100) : 0;

            totalStat.innerText = total;
            completedStat.innerText = completed;
            mobileDone.innerText = completed;
            efficiencyStat.innerText = efficiency + '%';

            if (total === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 opacity-40 font-medium">No tasks found. Start by adding one! 🚀</div>`;
                return;
            }

            grid.innerHTML = tasks.map(task => `
                <div class="task-card bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex flex-col justify-between hover:shadow-xl hover:border-blue-100 group">
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest 
                                ${task.priority === 'High' ? 'bg-red-100 text-red-600' : (task.priority === 'Medium' ? 'bg-orange-100 text-orange-600' : 'bg-blue-100 text-blue-600')}">
                                ${task.priority}
                            </span>
                            <span class="text-[10px] font-bold text-slate-300">#${task.id.toString().slice(-4)}</span>
                        </div>
                        <h4 class="text-lg font-bold text-slate-800 mb-1 leading-tight ${task.status === 'Completed' ? 'line-through opacity-40' : ''}">
                            ${task.title}
                        </h4>
                        <p class="text-sm text-slate-400 mb-6">
                            📅 ${new Date(task.deadline).toLocaleString([], {month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit'})}
                        </p>
                    </div>
                    
                    <div class="flex gap-3 mt-auto pt-4 border-t border-slate-50">
                        <button onclick="toggleComplete(${task.id})" class="flex-1 text-center py-3 ${task.status === 'Completed' ? 'bg-slate-100 text-slate-500' : 'bg-teal-50 text-teal-600'} font-bold rounded-xl transition active:scale-95">
                            ${task.status === 'Completed' ? 'Undo' : 'Complete'}
                        </button>
                        <button onclick="deleteTask(${task.id})" class="px-4 py-3 bg-red-50 text-red-600 font-bold rounded-xl hover:bg-red-500 hover:text-white transition active:scale-95">
                            ✕
                        </button>
                    </div>
                </div>
            `).join('');
        };

        // --- INITIALIZE ---
        document.getElementById('task-form').addEventListener('submit', addTask);
        renderTasks();
    </script>
</body>
</html>
