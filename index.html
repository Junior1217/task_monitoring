<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Task Monitoring Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-sidebar { background: linear-gradient(180deg, #1e3c72 0%, #2a5298 100%); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .task-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-50 flex flex-col md:flex-row min-h-screen">

    <div class="md:hidden glass-sidebar p-4 text-white flex justify-between items-center shadow-lg sticky top-0 z-50">
        <div>
            <h1 class="text-xl font-bold">Task Pro</h1>
            <p class="text-[10px] opacity-70 uppercase font-bold tracking-widest">By John Rein M. Pamplona</p>
        </div>
        <button onclick="toggleHistory()" class="bg-white/20 p-2 rounded-xl text-lg">🏆</button>
    </div>

    <aside class="hidden md:flex w-72 glass-sidebar text-white p-8 flex-col shadow-2xl sticky top-0 h-screen">
        <h1 class="text-3xl font-extrabold mb-12 tracking-tight">Task Monitoring</h1>
        
        <nav class="space-y-4 flex-1">
            <a href="#" class="flex items-center space-x-4 p-4 bg-white/10 rounded-2xl shadow-inner border border-white/10">
                <span>📊</span> <span class="font-semibold">Dashboard</span>
            </a>
            <button onclick="toggleHistory()" class="w-full flex items-center space-x-4 p-4 hover:bg-white/10 rounded-2xl transition border border-transparent hover:border-white/10 text-left">
                <span>🏆</span> <span class="font-semibold">Completed History</span>
            </button>
        </nav>

        <div class="mt-auto p-5 bg-white/5 rounded-2xl text-sm border border-white/10">
            <p class="opacity-70 text-xs uppercase font-bold tracking-widest">Made by</p>
            <p class="font-bold text-teal-400">John Rein M. Pamplona</p>
        </div>
    </aside>

    <main class="flex-1 p-4 md:p-12 lg:p-16 max-w-7xl mx-auto w-full">
        
        <div id="alert-zone" class="mb-8 space-y-3"></div>

        <header class="mb-10">
            <h2 class="text-2xl md:text-4xl font-bold text-slate-800" style="top: 0; font-size: 280%;">Your Tasks</h2>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-10">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-wider">Active</p>
                <p id="stat-total" class="text-3xl font-black text-slate-800">0</p>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-wider">Finished</p>
                <p id="stat-completed" class="text-3xl font-black text-teal-500">0</p>
            </div>
            <div class="bg-blue-600 p-6 rounded-3xl shadow-lg shadow-blue-200">
                <p class="text-blue-100 text-xs font-bold uppercase tracking-wider">Efficiency</p>
                <p id="stat-efficiency" class="text-3xl font-black text-white">0%</p>
            </div>
        </div>

        <section class="bg-white p-6 md:p-8 rounded-3xl shadow-xl border border-slate-100 mb-10">
            <form id="task-form" class="grid grid-cols-1 md:grid-cols-12 gap-6 items-end">
                <div class="md:col-span-5">
                    <label class="text-sm font-bold text-slate-700 mb-2 block">Task Title</label>
                    <input type="text" id="task-title" required placeholder="Project Name..." 
                           class="w-full p-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <div class="md:col-span-3">
                    <label class="text-sm font-bold text-slate-700 mb-2 block">Due Date</label>
                    <input type="datetime-local" id="task-deadline" required 
                           class="w-full p-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-blue-500 outline-none transition text-sm">
                </div>
                <div class="md:col-span-2">
                    <label class="text-sm font-bold text-slate-700 mb-2 block">Priority</label>
                    <select id="task-priority" class="w-full p-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-blue-500 outline-none transition appearance-none">
                        <option value="Low">Low</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <button type="submit" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-100 active:scale-95">Add Task</button>
                </div>
            </form>
        </section>

        <div id="task-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <div id="history-modal"
        class="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xl rounded-[2.5rem] shadow-2xl flex flex-col max-h-[85vh] overflow-hidden">
            <div class="p-8 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <div>
                    <h3 class="text-2xl font-black text-slate-800 bolder">Work History</h3>
                    <p class="text-slate-500 text-sm">All successfully completed tasks</p>
                </div>
                <button onclick="toggleHistory()"
                    class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 text-slate-400 hover:text-red-500 transition">✕</button>
            </div>
            <div id="history-list" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
            <div class="p-6 border-t border-slate-50 flex justify-between items-center">
                <p id="history-count" class="text-xs font-bold text-slate-400 uppercase tracking-widest">0 Achievements</p>
                <button onclick="clearHistory()" class="text-xs font-bold text-red-400 hover:text-red-600 transition">Clear Archive</button>
            </div>
        </div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let completedHistory = JSON.parse(localStorage.getItem('completed_history')) || [];

        const saveToStorage = () => {
            localStorage.setItem('tasks', JSON.stringify(tasks));
            localStorage.setItem('completed_history', JSON.stringify(completedHistory));
            renderTasks();
            renderHistory();
        };

        const addTask = (e) => {
            e.preventDefault();
            tasks.unshift({
                id: Date.now(),
                title: document.getElementById('task-title').value,
                deadline: document.getElementById('task-deadline').value,
                priority: document.getElementById('task-priority').value,
                status: 'Pending'
            });
            document.getElementById('task-form').reset();
            saveToStorage();
        };

        const deleteTask = (id) => {
            if(confirm('Remove this task?')) {
                tasks = tasks.filter(t => t.id !== id);
                saveToStorage();
            }
        };

        const toggleComplete = (id) => {
            const task = tasks.find(t => t.id === id);
            if (task.status === 'Pending') {
                task.status = 'Completed';
                completedHistory.unshift({ 
                    id: Date.now(), 
                    title: task.title, 
                    completionDate: new Date().toISOString() 
                });
            } else {
                task.status = 'Pending';
                completedHistory = completedHistory.filter(h => h.title !== task.title);
            }
            saveToStorage();
        };

        const checkDeadlines = () => {
            const alertZone = document.getElementById('alert-zone');
            alertZone.innerHTML = '';
            const now = new Date().getTime();
            tasks.forEach(task => {
                if (task.status === 'Completed') return;
                const hoursLeft = (new Date(task.deadline).getTime() - now) / (1000 * 60 * 60);
                if (hoursLeft > 0 && hoursLeft <= 10) {
                    const div = document.createElement('div');
                    div.className = "bg-rose-50 border-l-4 border-rose-500 p-4 rounded-2xl shadow-sm animate-pulse";
                    div.innerHTML = `<p class="text-rose-900 font-bold text-sm">⏰ Deadline Alert: "${task.title}" is due soon!</p>`;
                    alertZone.appendChild(div);
                }
            });
        };

        const toggleHistory = () => document.getElementById('history-modal').classList.toggle('hidden');
        const clearHistory = () => { if(confirm('Wipe history?')) { completedHistory = []; saveToStorage(); } };

        const renderHistory = () => {
            const list = document.getElementById('history-list');
            document.getElementById('history-count').innerText = `${completedHistory.length} Achievements`;
            list.innerHTML = completedHistory.map(item => `
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex items-center gap-3">
                    <div class="bg-teal-500 text-white p-1 rounded-full text-[8px]">✓</div>
                    <p class="text-slate-800 font-bold text-sm">${item.title}</p>
                </div>
            `).join('') || `<div class="text-center py-10 opacity-20 italic">AHHH WALA PANG NATATAPOS!!</div>`;
        };

        const renderTasks = () => {
            const grid = document.getElementById('task-grid');
            const completedCount = tasks.filter(t => t.status === 'Completed').length;
            
            document.getElementById('stat-total').innerText = tasks.filter(t => t.status === 'Pending').length;
            document.getElementById('stat-completed').innerText = completedCount;
            document.getElementById('stat-efficiency').innerText = tasks.length > 0 ? Math.round((completedCount/tasks.length)*100) + '%' : '0%';

            grid.innerHTML = tasks.map(task => {
                const isPending = task.status === 'Pending';
                const cardClass = isPending 
                    ? 'bg-slate-900 border-slate-800 shadow-2xl shadow-slate-200' 
                    : 'bg-slate-100/70 border-slate-200 opacity-60';
                
                const titleColor = isPending ? 'text-white' : 'text-slate-400 line-through';
                const dateColor = isPending ? 'text-slate-400' : 'text-slate-300';
                const btnPrimary = isPending 
                    ? 'bg-indigo-600 text-white hover:bg-indigo-500' 
                    : 'bg-slate-200 text-slate-500 hover:bg-slate-300';

                return `
                <div class="task-card p-6 rounded-[2rem] border ${cardClass} flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest 
                                ${isPending ? 'bg-indigo-500/20 text-indigo-300 border border-indigo-500/30' : 'bg-slate-200 text-slate-400'}">
                                ${task.priority}
                            </span>
                        </div>
                        <h4 class="text-lg font-bold mb-1 transition-all ${titleColor}">${task.title}</h4>
                        <p class="text-xs font-medium ${dateColor}">📅 ${new Date(task.deadline).toLocaleString([], {month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit'})}</p>
                    </div>
                    <div class="flex gap-3 mt-8">
                        <button onclick="toggleComplete(${task.id})" class="flex-1 py-3.5 rounded-2xl font-bold transition-all active:scale-95 ${btnPrimary}">
                            ${isPending ? 'Complete' : 'Undone'}
                        </button>
                        <button onclick="deleteTask(${task.id})" class="px-5 bg-rose-500/10 text-rose-500 rounded-2xl font-bold hover:bg-rose-500 hover:text-white transition-all active:scale-95">✕</button>
                    </div>
                </div>`;
            }).join('') || `<div class="col-span-full text-center py-20 opacity-30">No tasks found.</div>`;
        };

        document.getElementById('task-form').addEventListener('submit', addTask);
        saveToStorage();
        checkDeadlines();
        setInterval(checkDeadlines, 60000);
    </script>
</body>
</html>
